<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#111827"/></linearGradient><radialGradient id="core"><stop stop-color="#22d3ee" stop-opacity=".95"/><stop offset="1" stop-color="#0f172a" stop-opacity=".2"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1400" height="620" rx="34" fill="url(#bg)"/><text x="58" y="64" fill="#f8fafc" font-family="Inter,Arial" font-size="34" font-weight="700">Adaptive Multi-Modal SLAM</text><text x="58" y="102" fill="#94a3b8" font-family="Inter,Arial" font-size="18">Reliability-aware fusion that changes how much each sensor is trusted as conditions evolve.</text><g font-family="Inter,Arial"><circle cx="700" cy="315" r="118" fill="url(#core)" stroke="#22d3ee" stroke-width="3" filter="url(#glow)"/><text x="700" y="285" text-anchor="middle" fill="#ecfeff" font-size="26" font-weight="700">ADAPTIVE FUSION</text><text x="700" y="318" text-anchor="middle" fill="#a5f3fc" font-size="17">reliability → covariance</text><text x="700" y="345" text-anchor="middle" fill="#a5f3fc" font-size="17">gating → weighting</text><text x="700" y="375" text-anchor="middle" fill="#e2e8f0" font-size="15">pose · map · uncertainty</text><g text-anchor="middle"><circle cx="210" cy="180" r="70" fill="#0f2940" stroke="#38bdf8" stroke-width="3"/><text x="210" y="168" fill="#bae6fd" font-size="21" font-weight="700">CAMERA</text><text x="210" y="195" fill="#cbd5e1" font-size="14">texture · blur · tracks</text><circle cx="210" cy="440" r="70" fill="#261b3f" stroke="#a78bfa" stroke-width="3"/><text x="210" y="428" fill="#ddd6fe" font-size="21" font-weight="700">IMU</text><text x="210" y="455" fill="#cbd5e1" font-size="14">bias · noise · drift</text><circle cx="1190" cy="180" r="70" fill="#17392f" stroke="#34d399" stroke-width="3"/><text x="1190" y="168" fill="#a7f3d0" font-size="21" font-weight="700">LiDAR</text><text x="1190" y="195" fill="#cbd5e1" font-size="14">density · geometry</text><circle cx="1190" cy="440" r="70" fill="#3c2718" stroke="#f59e0b" stroke-width="3"/><text x="1190" y="428" fill="#fde68a" font-size="21" font-weight="700">RGB-D</text><text x="1190" y="455" fill="#cbd5e1" font-size="14">depth · saturation</text></g><path d="M275 200C410 220 480 265 575 300M275 420C410 400 480 355 575 330M1125 200C990 220 920 265 825 300M1125 420C990 400 920 355 825 330" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="10 9"/><g><rect x="430" y="145" width="185" height="56" rx="18" fill="#10243a" stroke="#38bdf8"/><text x="522" y="169" text-anchor="middle" fill="#e0f2fe" font-size="15" font-weight="700">QUALITY DIAGNOSTICS</text><text x="522" y="190" text-anchor="middle" fill="#94a3b8" font-size="13">online modality health</text><rect x="785" y="145" width="185" height="56" rx="18" fill="#1c2738" stroke="#a78bfa"/><text x="877" y="169" text-anchor="middle" fill="#ede9fe" font-size="15" font-weight="700">CONSISTENCY CHECKS</text><text x="877" y="190" text-anchor="middle" fill="#94a3b8" font-size="13">NIS · Mahalanobis</text></g><g><rect x="485" y="500" width="430" height="62" rx="22" fill="#132238" stroke="#22d3ee"/><text x="700" y="526" text-anchor="middle" fill="#cffafe" font-size="17" font-weight="700">degraded sensor → lower trust, inflated covariance, safer fusion</text><text x="700" y="549" text-anchor="middle" fill="#94a3b8" font-size="13">explanatory architecture visual · not a benchmark result</text></g></g></svg>