<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc"><title id="title">Adaptive multi-modal SLAM pipeline</title><desc id="desc">Camera, IMU, LiDAR and RGB-D measurements are synchronized, diagnosed, reliability weighted, fused, checked for consistency and converted into state and uncertainty estimates.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071522"/><stop offset="1" stop-color="#1c3443"/></linearGradient><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12Z" fill="#7dd3fc"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".3"/></filter></defs><rect width="1600" height="720" rx="28" fill="url(#bg)"/><text x="800" y="68" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="40" font-weight="700">Adaptive Multi-Modal SLAM with Uncertainty-Aware Fusion</text><text x="800" y="108" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="21">Online reliability estimation changes how each sensing modality influences state estimation</text><g filter="url(#s)" font-family="Arial"><rect x="45" y="205" width="240" height="260" rx="24" fill="#112f49" stroke="#4f87b3" stroke-width="2"/><rect x="330" y="205" width="240" height="260" rx="24" fill="#12364a" stroke="#4d9a99" stroke-width="2"/><rect x="615" y="205" width="240" height="260" rx="24" fill="#173b43" stroke="#4dbb98" stroke-width="2"/><rect x="900" y="205" width="240" height="260" rx="24" fill="#313c49" stroke="#7b9cc2" stroke-width="2"/><rect x="1185" y="205" width="240" height="260" rx="24" fill="#3a3449" stroke="#a18acb" stroke-width="2"/><rect x="1470" y="205" width="85" height="260" rx="24" fill="#3a303d" stroke="#c27eab" stroke-width="2"/><g fill="#f8fafc" text-anchor="middle"><text x="165" y="250" font-size="17" font-weight="700">MULTI-MODAL INPUT</text><text x="165" y="320" font-size="25" font-weight="700">Camera • IMU</text><text x="165" y="356" font-size="21">LiDAR • RGB-D</text><text x="165" y="396" font-size="17" fill="#b7c9dc">timestamped packets</text><text x="450" y="250" font-size="17" font-weight="700">SYNCHRONIZATION</text><text x="450" y="320" font-size="25" font-weight="700">Quality Diagnostics</text><text x="450" y="360" font-size="17" fill="#b7c9dc">blur • drift • sparsity</text><text x="450" y="389" font-size="17" fill="#b7c9dc">dropout • time offset</text><text x="735" y="250" font-size="17" font-weight="700">RELIABILITY</text><text x="735" y="320" font-size="25" font-weight="700">rᵢ(k)</text><text x="735" y="360" font-size="17" fill="#b7c9dc">health-aware weights</text><text x="735" y="389" font-size="17" fill="#b7c9dc">covariance inflation</text><text x="1020" y="250" font-size="17" font-weight="700">ADAPTIVE FUSION</text><text x="1020" y="320" font-size="25" font-weight="700">Estimator Backend</text><text x="1020" y="360" font-size="17" fill="#b7c9dc">pseudo-precision</text><text x="1020" y="389" font-size="17" fill="#b7c9dc">Mahalanobis gating</text><text x="1305" y="250" font-size="17" font-weight="700">CONSISTENCY</text><text x="1305" y="320" font-size="25" font-weight="700">NIS • NEES</text><text x="1305" y="360" font-size="17" fill="#b7c9dc">ATE • RPE • drift</text><text x="1305" y="389" font-size="17" fill="#b7c9dc">failure diagnostics</text><text x="1512" y="250" font-size="14" font-weight="700">OUTPUT</text><text x="1512" y="320" font-size="18" font-weight="700">Pose</text><text x="1512" y="350" font-size="18" font-weight="700">Map</text><text x="1512" y="380" font-size="18" font-weight="700">UQ</text></g></g><g stroke="#7dd3fc" stroke-width="4" marker-end="url(#a)"><line x1="285" y1="335" x2="315" y2="335"/><line x1="570" y1="335" x2="600" y2="335"/><line x1="855" y1="335" x2="885" y2="335"/><line x1="1140" y1="335" x2="1170" y2="335"/><line x1="1425" y1="335" x2="1455" y2="335"/></g><rect x="180" y="545" width="1240" height="100" rx="20" fill="#0a1d2d" stroke="#31526d" stroke-width="2"/><text x="800" y="585" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="23" font-weight="700">Core hypothesis</text><text x="800" y="620" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="19">A degraded modality should contribute less and report larger uncertainty instead of silently corrupting the fused estimate</text><text x="800" y="682" text-anchor="middle" fill="#7891a5" font-family="Arial" font-size="16">Conceptual research figure — not a completed production SLAM benchmark</text></svg>