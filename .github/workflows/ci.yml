name: Research Software CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phases:
    name: Executable research phases / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run all executable phases
        run: python scripts/run_all_phases.py

      - name: Upload phase artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase-artifacts-python-${{ matrix.python-version }}
          path: |
            results/phase_report.json
            results/*.json
            results/manifests/*.json
            results/plots/**
            results/videos/**
