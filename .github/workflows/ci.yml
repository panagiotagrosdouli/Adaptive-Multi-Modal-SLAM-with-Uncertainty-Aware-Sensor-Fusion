name: Research Software CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check slam_fusion src tests scripts

      - name: Black format check
        continue-on-error: true
        run: |
          black --check slam_fusion src tests scripts
          echo "Black formatting is advisory until the dedicated repository-wide style sweep lands."

      - name: Pytest
        run: pytest

      - name: Run executable research phases
        run: python scripts/run_all_phases.py

      - name: Upload phase artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase-artifacts-python-${{ matrix.python-version }}
          path: |
            results/phase_report.json
            results/*.json
            results/manifests/*.json
            results/plots/**
            results/videos/**
